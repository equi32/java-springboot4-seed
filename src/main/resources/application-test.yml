spring:
  # Flyway is enabled by default when using @ServiceConnection with PostgreSQL
  flyway:
    enabled: true
    baseline-on-migrate: false
  # Datasource is automatically configured by @ServiceConnection annotation
  # on the PostgreSQLContainer in TestContainers interface
  jpa:
    hibernate:
      ddl-auto: none  # Flyway manages schema, not Hibernate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false
  sql:
    init:
      mode: never  # Flyway handles schema migration
  # Kafka configuration for integration tests
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: api-seed-consumer-group-test
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    topics:
      product-events: product-events-test

# OpenSearch configuration for integration tests
opensearch:
  host: ${OPENSEARCH_HOST:localhost}
  port: ${OPENSEARCH_PORT:9200}
  scheme: http
  username: ${OPENSEARCH_USERNAME:elastic}
  password: ${OPENSEARCH_PASSWORD:changeme}
  index:
    products: products-test

# External API configuration
# Override via --external.api.product.base-url in tests using MockServerComponent
external:
  api:
    product:
      base-url: ${EXTERNAL_API_BASE_URL:https://fakestoreapi.com}
      timeout: 5000
      retry-attempts: 3

# Logging configuration for tests
logging:
  level:
    gov.justucuman.seed: DEBUG
    org.testcontainers: INFO
    org.mockserver: DEBUG
